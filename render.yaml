services:
  - type: web
    name: smartsiem-api
    runtime: node
    rootDir: Backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: AGENT_INGEST_REQUIRE_HTTPS
        value: "true"
